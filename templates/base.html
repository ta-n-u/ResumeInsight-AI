<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ResumeInsight AI{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #F8FAFC;
        }

        .auth-card {
            border: 1px solid #E2E8F0 !important;
            border-radius: 16px !important;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06) !important;
        }

        .form-control, .form-select {
            border-radius: 8px !important;
            border: 1.5px solid #E2E8F0 !important;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            padding: 10px 14px !important;
            transition: all 0.2s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #2563EB !important;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1) !important;
        }

        .btn {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            border-radius: 8px !important;
        }

        .btn-primary {
            background: #2563EB !important;
            border-color: #2563EB !important;
        }

        .btn-primary:hover {
            background: #1D4ED8 !important;
        }

        .toast {
            border-radius: 10px !important;
            font-size: 13.5px;
            font-weight: 500;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Flash Messages -->
    {% if messages %}
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
        {% for message in messages %}
        <div class="toast show align-items-center text-white
            {% if message.tags == 'success' %}bg-success
            {% elif message.tags == 'error' %}bg-danger
            {% elif message.tags == 'info' %}bg-info
            {% else %}bg-secondary{% endif %}
            border-0 mb-2" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-semibold">{{ message }}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    <!-- Bootstrap JS -->
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Auto-dismiss toasts after 4 seconds -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.toast').forEach(toastEl => {
                // Initialize the toast
                const toast = new bootstrap.Toast(toastEl, {
                    delay: 4000,      // auto hide after 4 seconds
                    autohide: true,
                });
                toast.show();

                // Wire up the X button manually
                toastEl.querySelector('[data-bs-dismiss="toast"]')
                    ?.addEventListener('click', () => toast.hide());
            });
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
