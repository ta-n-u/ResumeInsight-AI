{% extends 'base.html' %}
{% block title %}Forgot Password — ResumeInsight AI{% endblock %}

{% block content %}
<div style="min-height:100vh; display:flex; align-items:center;
            justify-content:center; background:#F8FAFC; padding:24px;">
    <div style="width:100%; max-width:420px;">

        <!-- Logo -->
        <div style="text-align:center; margin-bottom:32px;">
            <div style="width:48px; height:48px; background:#2563EB;
                        border-radius:12px; display:flex; align-items:center;
                        justify-content:center; color:white; font-size:22px;
                        margin:0 auto 16px;">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h4 style="font-weight:800; color:#0F172A; margin-bottom:6px;">
                Forgot Password?
            </h4>
            <p style="color:#64748B; font-size:14px;">
                Enter your email and we will send you a reset link.
            </p>
        </div>

        <!-- Card -->
        <div style="background:white; border:1px solid #E2E8F0;
                    border-radius:16px; padding:32px;
                    box-shadow:0 4px 24px rgba(0,0,0,0.06);">
            <form method="POST">
                {% csrf_token %}
                <label style="font-size:13px; font-weight:600; color:#374151;
                              display:block; margin-bottom:6px;">
                    Email Address
                </label>
                <input type="email" name="email" required
                       placeholder="Enter your registered email"
                       style="width:100%; padding:10px 14px; border-radius:8px;
                              border:1.5px solid #E2E8F0; font-size:14px;
                              font-family:'Plus Jakarta Sans',sans-serif;
                              margin-bottom:20px; outline:none; box-sizing:border-box;">
                <button type="submit"
                        style="width:100%; padding:12px; background:#2563EB;
                               color:white; border:none; border-radius:10px;
                               font-size:15px; font-weight:700; cursor:pointer;
                               font-family:'Plus Jakarta Sans',sans-serif;">
                    <i class="bi bi-send me-2"></i>Send Reset Link
                </button>
            </form>
        </div>

        <div style="text-align:center; margin-top:20px; font-size:13px; color:#64748B;">
            Remember your password?
            <a href="{% url 'login' %}"
               style="color:#2563EB; font-weight:600; text-decoration:none;">
                Sign In
            </a>
        </div>

    </div>
</div>
{% endblock %}
